<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diceGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diceGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#1a1a2e" rx="40"/>

  <!-- First die (left, rotating) -->
  <g transform="translate(60, 80) rotate(-25)" filter="url(#shadow)">
    <!-- Main cube -->
    <rect x="0" y="0" width="50" height="50" fill="url(#diceGrad1)" stroke="#666" stroke-width="1.5" rx="4"/>
    <!-- Top face (visible) -->
    <polygon points="0,0 15,-12 65,-12 50,0" fill="url(#diceGrad2)" stroke="#666" stroke-width="1.5"/>
    <!-- Right face -->
    <polygon points="50,0 65,-12 65,38 50,50" fill="#d0d0d0" stroke="#666" stroke-width="1.5"/>

    <!-- Pips on front face -->
    <circle cx="25" cy="25" r="2.5" fill="#333"/>
    <circle cx="15" cy="15" r="2" fill="#333"/>
    <circle cx="35" cy="35" r="2" fill="#333"/>
    <circle cx="10" cy="35" r="2" fill="#333"/>
    <circle cx="40" cy="15" r="2" fill="#333"/>
  </g>

  <!-- Second die (right, rotating opposite direction) -->
  <g transform="translate(110, 70) rotate(30)" filter="url(#shadow)">
    <!-- Main cube -->
    <rect x="0" y="0" width="50" height="50" fill="url(#diceGrad1)" stroke="#666" stroke-width="1.5" rx="4"/>
    <!-- Top face (visible) -->
    <polygon points="0,0 15,-12 65,-12 50,0" fill="url(#diceGrad2)" stroke="#666" stroke-width="1.5"/>
    <!-- Right face -->
    <polygon points="50,0 65,-12 65,38 50,50" fill="#d0d0d0" stroke="#666" stroke-width="1.5"/>

    <!-- Pips on front face (6) -->
    <circle cx="12" cy="12" r="2.5" fill="#c41e3a"/>
    <circle cx="38" cy="12" r="2.5" fill="#c41e3a"/>
    <circle cx="12" cy="25" r="2.5" fill="#c41e3a"/>
    <circle cx="38" cy="25" r="2.5" fill="#c41e3a"/>
    <circle cx="12" cy="38" r="2.5" fill="#c41e3a"/>
    <circle cx="38" cy="38" r="2.5" fill="#c41e3a"/>
  </g>

  <!-- Motion blur lines -->
  <g stroke="#666" stroke-width="1.5" opacity="0.3" stroke-linecap="round">
    <line x1="40" y1="70" x2="20" y2="60"/>
    <line x1="150" y1="100" x2="170" y2="110"/>
  </g>
</svg>